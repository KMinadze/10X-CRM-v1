<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10X-CRM</title>
    <link rel="stylesheet" href="./css/dashboard.css" />
    <link rel="stylesheet" href="./css/profile.css" />
  </head>
  <body>
    <div id="global-navbar"></div>

    <main class="profile-container">
      <section class="profile-card info-block">
        <div class="avatar-container" id="userAvatar">NB</div>
        <div class="user-details">
          <h2 id="displayFullName">Nino Beridze</h2>
          <p class="user-meta" id="displayMeta">nino@example.com · 10X Sales</p>
          <p class="user-date" id="displayMemberSince">
            Member since 05/07/2026
          </p>
        </div>
      </section>

      <div class="profile-grid">
        <section class="profile-card">
          <h3>Edit Profile</h3>
          <form id="editProfileForm">
            <div class="form-group">
              <label for="profileFullName">Full Name*</label>
              <input type="text" id="profileFullName" />
              <span
                class="error-message"
                id="profileNameError"
                style="display: none; color: red"
              ></span>
            </div>
            <div class="form-group">
              <label for="profileCompany">Company</label>
              <input type="text" id="profileCompany" />
            </div>
            <button type="submit" class="btn-primary">A. Save Changes</button>
          </form>
        </section>

        <section class="profile-card">
          <h3>Change Password</h3>
          <form id="changePasswordForm">
            <div class="form-group">
              <label for="currentPassword">Current Password*</label>
              <input type="password" id="currentPassword" />
              <span
                class="error-message"
                id="currentPasswordError"
                style="display: none; color: red"
              ></span>
            </div>
            <div class="form-group">
              <label for="newPassword">New Password*</label>
              <input type="password" id="newPassword" />
              <span
                class="error-message"
                id="newPasswordError"
                style="display: none; color: red"
              ></span>
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm New Password*</label>
              <input type="password" id="confirmPassword" />
              <span
                class="error-message"
                id="confirmPasswordError"
                style="display: none; color: red"
              ></span>
            </div>
            <button type="submit" class="btn-secondary">
              B. Change Password
            </button>
          </form>
        </section>
      </div>

      <section class="profile-card data-management">
        <h3>Data Management</h3>
        <p>
          Warning: Resetting CRM data will wipe out all changes made to your
          clients and restore the baseline mock data.
        </p>
        <button id="resetDataBtn" class="btn-danger">C. Reset CRM Data</button>
      </section>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="./js/app.js"></script>
    <script src="./js/profile.js"></script>
  </body>
</html>
